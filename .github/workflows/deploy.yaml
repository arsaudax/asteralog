name: Deploy Asteralog Sites

on:
  push:
    branches: [main]
  repository_dispatch:
    types: [content-updated]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.ASTERALOG_DEPLOY }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: |
          npm ci
          cd utils/content-sync && npm ci --no-package-lock

      - name: Clone or update garden content
        run: |
          if [ -d "content-garden" ]; then
            cd content-garden && git pull origin main && cd ..
          else
            git clone https://x-access-token:${{ secrets.ASTERALOG_DEPLOY }}@github.com/arsaudax/garden-content.git content-garden
          fi
          cd content-garden && git log -1 --oneline && cd ..

      - name: Clone or update blog content
        run: |
          if [ -d "content-blog" ]; then
            cd content-blog && git pull origin main && cd ..
          else
            git clone https://x-access-token:${{ secrets.ASTERALOG_DEPLOY }}@github.com/arsaudax/blog-content.git content-blog
          fi
          cd content-blog && git log -1 --oneline && cd ..

      - name: Sync content
        run: node utils/content-sync/index.js
        env:
          NODE_ENV: production

      # ========== GARDEN BUILD ==========
      - name: Print Garden env
        run: |
          echo "SITE_TYPE=$SITE_TYPE"
          echo "BASE_URL=$BASE_URL"
        env:
          SITE_TYPE: garden
          BASE_URL: garden.asteralog.ru

      - name: Build Garden
        run: node quartz/bootstrap-cli.mjs build --directory content-garden --output public-garden
        env:
          BASE_URL: garden.asteralog.ru
          SITE_TYPE: garden
          NODE_OPTIONS: --max-old-space-size=4096

      - name: Debug garden build
        run: |
          echo "### 🌱 Garden Build Debug ###"
          echo "SITE_TYPE: $SITE_TYPE"
          echo "BASE_URL: $BASE_URL"
          echo ""
          echo "📁 Files in public-garden/:"
          ls -la public-garden/ || echo "Directory not found"
          echo ""
          if [ -f "public-garden/index.html" ]; then
            echo "📄 First 20 lines of index.html:"
            head -20 public-garden/index.html
            echo ""
            echo "🔍 Checking for 404 page..."
            if grep -q "404" public-garden/index.html; then
              echo "❌ ERROR: index.html is a 404 page!"
              exit 1
            else
              echo "✅ index.html looks good"
            fi
          else
            echo "❌ ERROR: index.html not found!"
            exit 1
          fi
        env:
          SITE_TYPE: garden
          BASE_URL: garden.asteralog.ru

      - name: Add CNAME for garden
        run: echo "garden.asteralog.ru" > public-garden/CNAME

      - name: Deploy Garden
        uses: peaceiris/actions-gh-pages@v4
        with:
          personal_token: ${{ secrets.ASTERALOG_DEPLOY }}
          external_repository: arsaudax/garden.asteralog.ru
          publish_dir: ./public-garden
          publish_branch: gh-pages
          force_orphan: true
          user_name: 'github-actions[bot]'
          user_email: 'github-actions[bot]@users.noreply.github.com'

      # ========== BLOG BUILD ==========
      - name: Print Blog env
        run: |
          echo "SITE_TYPE=$SITE_TYPE"
          echo "BASE_URL=$BASE_URL"
        env:
          SITE_TYPE: blog
          BASE_URL: blog.asteralog.ru

      - name: Build Blog
        run: node quartz/bootstrap-cli.mjs build --directory content-blog --output public-blog
        env:
          BASE_URL: blog.asteralog.ru
          SITE_TYPE: blog
          NODE_OPTIONS: --max-old-space-size=4096

      - name: Debug blog build
        run: |
          echo "### 📝 Blog Build Debug ###"
          echo "SITE_TYPE: $SITE_TYPE"
          echo "BASE_URL: $BASE_URL"
          echo ""
          echo "📁 Files in public-blog/:"
          ls -la public-blog/ || echo "Directory not found"
          echo ""
          if [ -f "public-blog/index.html" ]; then
            echo "📄 First 20 lines of index.html:"
            head -20 public-blog/index.html
            echo ""
            echo "🔍 Checking for 404 page..."
            if grep -q "404" public-blog/index.html; then
              echo "❌ ERROR: index.html is a 404 page!"
              exit 1
            else
              echo "✅ index.html looks good"
            fi
          else
            echo "❌ ERROR: index.html not found!"
            exit 1
          fi
        env:
          SITE_TYPE: blog
          BASE_URL: blog.asteralog.ru

      - name: Add CNAME for blog
        run: echo "blog.asteralog.ru" > public-blog/CNAME

      - name: Deploy Blog
        uses: peaceiris/actions-gh-pages@v4
        with:
          personal_token: ${{ secrets.ASTERALOG_DEPLOY }}
          external_repository: arsaudax/blog.asteralog.ru
          publish_dir: ./public-blog
          publish_branch: gh-pages
          force_orphan: true
          user_name: 'github-actions[bot]'
          user_email: 'github-actions[bot]@users.noreply.github.com'