name: Deploy Quartz sites

on:
  push:
    branches:
      - main

jobs:
  sync-content:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository with submodules
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: recursive
          token: ${{ secrets.ASTERALOG_DEPLOY }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: latest

      - name: Install dependencies
        run: npm ci

      - name: Sync content to submodules
        run: npm run sync-content

      - name: Commit and push submodule updates
        run: |
          # Настроим git
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          # Обновим garden-content
          cd content-garden
          git add .
          if ! git diff --quiet || ! git diff --staged --quiet; then
            git commit -m "Update garden content from sync"
            git push https://x-access-token:${{ secrets.ASTERALOG_DEPLOY }}@github.com/arsaudax/garden-content.git HEAD:main
          else
            echo "No changes in garden-content"
          fi
          cd ..
          
          # Обновим blog-content
          cd content-blog
          git add .
          if ! git diff --quiet || ! git diff --staged --quiet; then
            git commit -m "Update blog content from sync"
            git push https://x-access-token:${{ secrets.ASTERALOG_DEPLOY }}@github.com/arsaudax/blog-content.git HEAD:main
          else
            echo "No changes in blog-content"
          fi
          cd ..
          
          # Обновим ссылки на подмодули в основном репозитории
          git add content-garden content-blog
          if ! git diff --quiet || ! git diff --staged --quiet; then
            git commit -m "Update submodule references"
            git push
          else
            echo "No changes in submodule references"
          fi

  deploy-garden:
    needs: sync-content
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive
          token: ${{ secrets.ASTERALOG_DEPLOY }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: latest

      - name: Install dependencies
        run: npm ci

      - name: Build Garden site
        run: |
          # Используем content-garden как источник
          rm -rf content
          ln -s content-garden content
          npx quartz build
        env:
          BASE_URL: "garden.asteralog.ru"

      - name: Deploy to garden subdomain
        uses: peaceiris/actions-gh-pages@v4
        with:
          personal_token: ${{ secrets.ASTERALOG_DEPLOY }}
          publish_dir: ./public
          external_repository: arsaudax/garden.asteralog.ru
          publish_branch: main
          cname: garden.asteralog.ru

  deploy-blog:
    needs: sync-content
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive
          token: ${{ secrets.ASTERALOG_DEPLOY }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: latest

      - name: Install dependencies
        run: npm ci

      - name: Build Blog site
        run: |
          # Используем content-blog как источник
          rm -rf content
          ln -s content-blog content
          npx quartz build
        env:
          BASE_URL: "blog.asteralog.ru"

      - name: Deploy to blog subdomain
        uses: peaceiris/actions-gh-pages@v4
        with:
          personal_token: ${{ secrets.ASTERALOG_DEPLOY }}
          publish_dir: ./public
          external_repository: arsaudax/blog.asteralog.ru
          publish_branch: main
          cname: blog.asteralog.ru