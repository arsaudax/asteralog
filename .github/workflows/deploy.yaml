name: Deploy Asteralog Sites

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0
          token: ${{ secrets.ASTERALOG_DEPLOY }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: |
          npm ci
          cd utils/content-sync && npm install

      - name: Sync content
        run: node utils/content-sync/index.js

      - name: Update and commit garden content
        run: |
          cd content-garden
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout main
          git pull origin main
          git add -A
          if ! git diff --quiet --cached || ! git diff --quiet; then
            git commit -m "chore: sync garden content [skip ci]"
            git push origin main
          else
            echo "No changes in garden content"
          fi
          cd ..

      - name: Update and commit blog content
        run: |
          cd content-blog
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout main
          git pull origin main
          git add -A
          if ! git diff --quiet --cached || ! git diff --quiet; then
            git commit -m "chore: sync blog content [skip ci]"
            git push origin main
          else
            echo "No changes in blog content"
          fi
          cd ..

      - name: Build Garden
        run: npx quartz build --directory content-garden --output public
        env:
          BASE_URL: garden.asteralog.ru

      - name: Debug build output
        run: |
          echo "=== Current directory ==="
          pwd
          echo "=== Content of public directory ==="
          ls -la public/
          echo "=== First 20 lines of index.html ==="
          cat public/index.html | head -20
          echo "=== Checking for 404 ==="
          if grep -q "404" public/index.html; then
            echo "❌ index.html is 404 page!"
            echo "=== Looking for any index.md in source ==="
            find content-garden -name "index.md" | xargs cat | head -10
          else
            echo "✅ index.html looks good"
          fi
        working-directory: ${{ github.workspace }}

      - name: Deploy Garden
        uses: peaceiris/actions-gh-pages@v4
        with:
          personal_token: ${{ secrets.ASTERALOG_DEPLOY }}
          external_repository: arsaudax/garden.asteralog.ru
          publish_dir: ./public
          publish_branch: gh-pages
          force_orphan: true
          destination_dir: ./

      - name: Build Blog
        run: npx quartz build --directory content-blog --output public
        env:
          BASE_URL: blog.asteralog.ru

      - name: Debug blog output
        run: |
          echo "=== Blog build debug ==="
          ls -la public/
          cat public/index.html | head -20
        working-directory: ${{ github.workspace }}

      - name: Deploy Blog
        uses: peaceiris/actions-gh-pages@v4
        with:
          personal_token: ${{ secrets.ASTERALOG_DEPLOY }}
          external_repository: arsaudax/blog.asteralog.ru
          publish_dir: ./public
          publish_branch: gh-pages
          force_orphan: true
          destination_dir: ./