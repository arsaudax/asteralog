name: Deploy Quartz sites

on:
  push:
    branches:
      - main

jobs:
  deploy-garden:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: latest
      
      - name: Install dependencies
        run: npm ci
      
      - name: Build Garden site
        env:
          BASE_URL: "garden.asteralog.ru"
        run: |
          npx quartz build
      
      - name: Deploy to garden subdomain
        uses: peaceiris/actions-gh-pages@v4
        with:
          personal_token: ${{ secrets.ASTERALOG_DEPLOY }}
          publish_dir: ./public
          external_repository: arsaudax/garden.asteralog.ru
          publish_branch: main
          cname: garden.asteralog.ru

  deploy-blog:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: latest
      
      - name: Install dependencies
        run: npm ci
      
      - name: Build Blog site
        env:
          BASE_URL: "blog.asteralog.ru"
        run: |
          npx quartz build
      
      - name: Deploy to blog subdomain
        uses: peaceiris/actions-gh-pages@v4
        with:
          personal_token: ${{ secrets.ASTERALOG_DEPLOY }}
          publish_dir: ./public
          external_repository: arsaudax/blog.asteralog.ru
          publish_branch: main
          cname: blog.asteralog.ru