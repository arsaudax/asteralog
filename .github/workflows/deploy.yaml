name: Deploy Quartz sites

on:
  push:
    branches:
      - main

jobs:
  sync-content:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.ASTERALOG_DEPLOY }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: latest

      - name: Install dependencies
        run: npm ci

      - name: Sync content
        run: npm run sync-content

      - name: Upload garden content artifact
        uses: actions/upload-artifact@v4
        with:
          name: garden-content
          path: content-garden

      - name: Upload blog content artifact
        uses: actions/upload-artifact@v4
        with:
          name: blog-content
          path: content-blog

  deploy-garden:
    needs: sync-content
    runs-on: ubuntu-latest
    steps:
      - name: Download garden content
        uses: actions/download-artifact@v4
        with:
          name: garden-content
          path: content

      - name: Checkout Quartz
        uses: actions/checkout@v4
        with:
          repository: jackyzha0/quartz
          path: quartz

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: latest

      - name: Build Garden site
        working-directory: ./quartz
        run: |
          npm ci
          cp ${{ github.workspace }}/quartz.config.ts quartz.config.ts
          cp -r ${{ github.workspace }}/content content
          npx quartz build
        env:
          BASE_URL: "garden.asteralog.ru"

      - name: Deploy to garden subdomain
        uses: peaceiris/actions-gh-pages@v4
        with:
          personal_token: ${{ secrets.ASTERALOG_DEPLOY }}
          publish_dir: ./quartz/public
          external_repository: arsaudax/garden.asteralog.ru
          publish_branch: main
          cname: garden.asteralog.ru

  deploy-blog:
    needs: sync-content
    runs-on: ubuntu-latest
    steps:
      - name: Download blog content
        uses: actions/download-artifact@v4
        with:
          name: blog-content
          path: content

      - name: Checkout Quartz
        uses: actions/checkout@v4
        with:
          repository: jackyzha0/quartz
          path: quartz

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: latest

      - name: Build Blog site
        working-directory: ./quartz
        run: |
          npm ci
          cp ${{ github.workspace }}/quartz.config.ts quartz.config.ts
          cp -r ${{ github.workspace }}/content content
          npx quartz build
        env:
          BASE_URL: "blog.asteralog.ru"

      - name: Deploy to blog subdomain
        uses: peaceiris/actions-gh-pages@v4
        with:
          personal_token: ${{ secrets.ASTERALOG_DEPLOY }}
          publish_dir: ./quartz/public
          external_repository: arsaudax/blog.asteralog.ru
          publish_branch: main
          cname: blog.asteralog.ru