name: Deploy Asteralog Sites

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0
          token: ${{ secrets.ASTERALOG_DEPLOY }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: |
         npm ci
         cd utils/content-sync && npm install

      - name: Sync content
        run: node utils/content-sync/index.js

      - name: Update content submodules
        run: |
          cd content-garden
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .
          git diff --quiet && git diff --staged --quiet || git commit -m "chore: update garden content [skip ci]"
          git push origin main
          cd ../content-blog
          git add .
          git diff --quiet && git diff --staged --quiet || git commit -m "chore: update blog content [skip ci]"
          git push origin main

      - name: Build Garden
        run: npx quartz build
        env:
          BASE_URL: garden.asteralog.ru

      - name: Deploy Garden
        uses: peaceiris/actions-gh-pages@v4
        with:
          personal_token: ${{ secrets.ASTERALOG_DEPLOY }}
          external_repository: arsaudax/garden.asteralog.ru
          publish_dir: ./public
          publish_branch: gh-pages
          destination_dir: ./

      - name: Build Blog
        run: npx quartz build
        env:
          BASE_URL: blog.asteralog.ru

      - name: Deploy Blog
        uses: peaceiris/actions-gh-pages@v4
        with:
          personal_token: ${{ secrets.ASTERALOG_DEPLOY }}
          external_repository: arsaudax/blog.asteralog.ru
          publish_dir: ./public
          publish_branch: gh-pages
          destination_dir: ./